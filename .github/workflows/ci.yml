name: C/C++ CI

on: [push, pull_request]

jobs:
  Tarball:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: install dependencies
      run:
        sudo apt-get update
        && sudo apt-get install g++ autoconf-archive libasound-dev doxygen
    - name: automake
      run:
        (./autogen.sh || (cat config.log; false))
        && make distcheck && make clean
    - name: Archive dist tarball artifact
      uses: actions/upload-artifact@v4
      with:
        name: rtaudio-dev-tarball
        path: rtaudio-*.tar.gz

  Linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - api: jack
            APIcmake: JACK
            mesonapi: jack=enabled
            deps: libjack-dev
          - api: alsa
            APIcmake: ALSA
            mesonapi: alsa=enabled
            deps: libasound-dev
          - api: pulse
            APIcmake: PULSE
            mesonapi: pulse=enabled
            deps: libpulse-dev
          - api: oss
            APIcmake: OSS
            mesonapi: oss=true
            deps: oss4-dev
    steps:
    - uses: actions/checkout@v2
      with:
        fetch-depth: 0
    - name: install dependencies
      run:
        sudo apt-get update
        && sudo apt-get install g++ autoconf-archive cmake python3-pip ninja-build doxygen ${{matrix.deps}}
        && sudo pip install meson>=0.55.0
    - name: automake
      run:
        env NOCONFIGURE=1 ./autogen.sh && mkdir bld-automake && cd bld-automake
        && (../configure --prefix=$PWD/inst --with-${{matrix.api}} || (cat config.log; false))
        && make V=1 && make check && make install && find inst
    - name: CMake
      run:
        mkdir bld-cmake && cd bld-cmake
        && cmake .. -DCMAKE_INSTALL_PREFIX=$PWD/inst -DRTAUDIO_WARNINGS_AS_ERRORS=ON -DRTAUDIO_API_OSS=OFF -DRTAUDIO_API_ALSA=OFF -DRTAUDIO_API_PULSE=OFF -DRTAUDIO_API_JACK=OFF -DRTAUDIO_API_${{matrix.APIcmake}}=ON && make VERBOSE=1 && make install && find inst
    - name: Meson
      run: meson bld-meson --prefix=$PWD/bld-meson/inst -Ddocs=true -Dalsa=disabled -Djack=disabled -Dpulse=disabled -Doss=false -D${{matrix.mesonapi}} && cd bld-meson && ninja -j1 -v install && find inst

  MacOS:
    runs-on: macOS-latest
    steps:
    - uses: actions/checkout@v2
      with:
        fetch-depth: 0
    - name: install dependencies
      run: brew install autoconf-archive automake cmake meson libtool
    - name: automake
      run:
        env NOCONFIGURE=1 ./autogen.sh && mkdir bld-automake && cd bld-automake
        && (../configure --prefix=$PWD/inst || (cat config.log; false))
        && make V=1 && make check && make install && find inst
    - name: CMake
      run: mkdir bld-cmake && cd bld-cmake && cmake .. -DCMAKE_INSTALL_PREFIX=$PWD/inst -DRTAUDIO_WARNINGS_AS_ERRORS=ON && make VERBOSE=1 && make install && find inst
    - name: Meson
      run: meson bld-meson --prefix=$PWD/bld-meson/inst && cd bld-meson && ninja -j1 -v install && find inst

  MinGW:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          # WASAPI/DirectSound compile only our code, so they enforce -Werror.
          # ASIO pulls in the vendored Steinberg SDK sources, which we do not
          # own and which emit their own warnings, so it is not -Werror.
          - host: i686-w64-mingw32
            api: dsound
            cxxflags: -Werror
          - host: x86_64-w64-mingw32
            api: dsound
            cxxflags: -Werror
          - host: i686-w64-mingw32
            api: asio
            cppflags: -Wno-unused-but-set-variable
          - host: x86_64-w64-mingw32
            api: asio
            cppflags: -Wno-unused-but-set-variable
          - host: i686-w64-mingw32
            api: wasapi
            cxxflags: -Werror
          - host: x86_64-w64-mingw32
            api: wasapi
            cxxflags: -Werror
    steps:
    - uses: actions/checkout@v2
      with:
        fetch-depth: 0
    - name: install dependencies
      run: sudo apt-get update && sudo apt-get install g++-mingw-w64 autoconf-archive
    - name: automake
      run:
        env NOCONFIGURE=1 ./autogen.sh
        && mkdir bld-automake && cd bld-automake
        && (../configure --prefix=$PWD/inst --host=${{matrix.host}} --with-${{matrix.api}} CPPFLAGS=${{matrix.cppflags}} CXXFLAGS=${{matrix.cxxflags}} || (cat config.log; false))
        && make V=1 && make install && find inst

  # Build with AddressSanitizer + UndefinedBehaviorSanitizer and run the test
  # suite. The registered tests (apinames, unittest) exercise the portable
  # code paths and do not require an audio device.
  Sanitizers:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: install dependencies
      run: sudo apt-get update && sudo apt-get install -y g++ cmake ninja-build libasound-dev
    - name: build and test (ASan/UBSan)
      run: |
        cmake -S . -B bld-asan -G Ninja \
          -DRTAUDIO_API_ALSA=ON -DRTAUDIO_BUILD_TESTING=ON \
          -DCMAKE_BUILD_TYPE=Debug \
          -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all -fno-omit-frame-pointer -g"
        cmake --build bld-asan -v
        ctest --test-dir bld-asan --output-on-failure

  # Strictly enforce a warning-clean, well-defined portable core. This builds
  # the API-independent (dummy) configuration with -Wall -Wextra -Wpedantic
  # -Werror on both GCC and Clang so portable regressions fail the build.
  StrictWarnings:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        compiler: [g++, clang++]
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: install dependencies
      run: sudo apt-get update && sudo apt-get install -y g++ clang cmake ninja-build
    - name: build (warnings as errors)
      env:
        CXX: ${{matrix.compiler}}
      run: |
        cmake -S . -B bld-strict -G Ninja \
          -DRTAUDIO_API_ALSA=OFF -DRTAUDIO_API_PULSE=OFF \
          -DRTAUDIO_API_JACK=OFF -DRTAUDIO_API_OSS=OFF \
          -DRTAUDIO_BUILD_TESTING=ON -DRTAUDIO_WARNINGS_AS_ERRORS=ON \
          -DCMAKE_CXX_FLAGS="-Wpedantic"
        cmake --build bld-strict -v
        ctest --test-dir bld-strict --output-on-failure

  # Static analysis. These tools surface findings on the mature backend code
  # that are not yet all resolved, so the job is informational (it does not
  # fail the build) but the output is available in the logs.
  StaticAnalysis:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: install dependencies
      run: sudo apt-get update && sudo apt-get install -y g++ cmake ninja-build clang-tidy cppcheck libasound-dev
    - name: clang-tidy
      continue-on-error: true
      run: |
        cmake -S . -B bld-tidy -G Ninja \
          -DRTAUDIO_API_ALSA=ON -DCMAKE_EXPORT_COMPILE_COMMANDS=ON
        clang-tidy -p bld-tidy RtAudio.cpp rtaudio_c.cpp
    - name: cppcheck
      continue-on-error: true
      run: |
        cppcheck --std=c++11 --enable=warning,performance,portability \
          --inline-suppr --suppress=missingIncludeSystem \
          --quiet RtAudio.cpp rtaudio_c.cpp tests/unittest.cpp
